        body { cursor: none; }
        a, button, input { cursor: none; }
        #custom-cursor {
            width: 24px; height: 24px;

        /* Эквалайзер */

        }
        .equalizer { display: flex; align-items: flex-end; gap: 3px; width: 35px; height: 20px; }
        .equalizer .bar { width: 3px; height: 100%; background-color: #ff52a2; transform-origin: bottom; transform: scaleY(0.1); }
        .equalizer.playing .bar { animation: cuteBounce 0.7s ease infinite alternate; }
        .equalizer.playing .bar:nth-child(2) { animation-delay: 0.15s; animation-duration: 0.5s; }
        .equalizer.playing .bar:nth-child(3) { animation-delay: 0.3s; animation-duration: 0.8s; }
        .equalizer.playing .bar:nth-child(4) { animation-delay: 0.1s; animation-duration: 0.6s; }
        @keyframes cuteBounce { 0% { transform: scaleY(0.1); } 100% { transform: scaleY(1); } }
    </style>

            <div class="modal-buttons">

                <button id="modal-submit" class="modal-btn confirm">SEND ❤️</button>

    <script>
        // --- ЛОГИКА КУРСОРА ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- ЖИВОЙ СЧЕТЧИК ---
        let coinsCount = 742;
        const pingVal = document.getElementById('ping-val');
        const packetsVal = document.getElementById('packets-val');

        function updateStats() {
            pingVal.textContent = Math.floor(Math.random() * (100 - 95 + 1)) + 95;
            coinsCount += Math.floor(Math.random() * 2) + 1;
            packetsVal.textContent = coinsCount;
            setTimeout(updateStats, Math.random() * 800 + 400);
        }
        updateStats();

        // --- ЭФФЕКТ РАСШИФРОВКИ НА КНОПКАХ ---
        const charsList = '01🌸🎀🐾💗✨⭐🐈🐾';
        
        document.querySelectorAll('.cyber-btn').forEach(btn => {
            const textNode = btn.querySelector('.btn-text');
            const originalText = btn.getAttribute('data-scramble');
            let interval = null;

            btn.addEventListener('mouseenter', () => {
                let iteration = 0;
                clearInterval(interval);
                
                interval = setInterval(() => {
                    textNode.innerText = originalText
                        .split("")
                        .map((letter, index) => {
                            if(index < iteration) return originalText[index];
                            return charsList[Math.floor(Math.random() * charsList.length)];
                        })
                        .join("");
                    if(iteration >= originalText.length) clearInterval(interval);
                    iteration += 1 / 3;
                }, 30);
                cursor.textContent = "🌸";
            });

            btn.addEventListener('mouseleave', () => {
                clearInterval(interval);
                textNode.innerText = originalText;
                cursor.textContent = "🐾";
            });
        });

        // --- МОДАЛКА ЛАЙКА ---
        const likeBtn = document.getElementById('like-trigger-btn');
        const modal = document.getElementById('custom-modal');
        const modalCancel = document.getElementById('modal-cancel');
        const modalSubmit = document.getElementById('modal-submit');
        const nameInput = document.getElementById('rebel-name-input');

        likeBtn.addEventListener('click', () => {
            nameInput.value = '';
            modal.classList.add('open');
        });

        modalCancel.addEventListener('click', () => {
            modal.classList.remove('open');
            playCuteBeep(350, 0.08);
        });

        modalSubmit.addEventListener('click', () => {
            let nickname = nameInput.value.trim();
            if (!nickname) nickname = "KAWAII_NEKO";

            const messageText = `🌸 [MILISI HUB REPORT] 🌸\n` +
                                `========================\n` +
                                `• USER_ID: ${nickname}\n` +
                                `• STYLE: PINK NEKO CORE 💞\n` +
                                `• STATUS: COZY AND CUTE 🔥\n` +
                                `========================\n` +
                                `Сайтик просто нереальный! Розовый неоновый стиль, котики и музыка — полный восторг и эстетика! Лови огромный респект и сочный лайк! 🎀🐾✨`;

            const telegramUrl = `https://t.me/webFenix?text=${encodeURIComponent(messageText)}`;
            modal.classList.remove('open');
            playCuteBeep(900, 0.15);
            window.open(telegramUrl, '_blank');
        });

        // --- ЛОГИ ЗАГРУЗКИ ---
        const logs = [
            "[SYSTEM] LOADING MILISI COZY OS v1.0...",
            "[ASSETS] GENERATING NEKO SPRITES...",
            "[AUDIO] CACHING 'AGENCY OF VIOLENCE' TRACK...",
            "[THEME] INJECTING NEON PINK PALETTE...",
            "[STATUS] NEKO SYSTEM STARTED SUCCESSFULLY.",
            "ALL CUTE SYSTEMS ARE ONLINE..."
        ];
        
        const logContainer = document.getElementById("log-container");
        const startBtn = document.getElementById("start-btn");
        let logIndex = 0;

        function playCuteBeep(freq = 523, duration = 0.05) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function showLogs() {
            if (logIndex < logs.length) {
                const p = document.createElement("p");
                p.textContent = logs[logIndex];
                logContainer.appendChild(p);
                playCuteBeep(700, 0.03);
                logIndex++;
                setTimeout(showLogs, 350);
            } else {
                startBtn.style.display = "block";
            }
        }
        window.addEventListener("load", showLogs);

        // --- ВКЛЮЧЕНИЕ САЙТА ---
        const bgMusic = document.getElementById("bg-music");
        const preloader = document.getElementById("preloader");
        const mainContent = document.getElementById("main-content");
        const muteToggle = document.getElementById("mute-toggle");
        const equalizer = document.getElementById("equalizer");

        startBtn.addEventListener("click", () => {
            preloader.style.opacity = "0";
            setTimeout(() => {
                preloader.style.display = "none";
                mainContent.classList.add("active");
                bgMusic.volume = 0.3; 
                bgMusic.play()
                    .then(() => equalizer.classList.add('playing'))
                    .catch(() => console.log("Audio blocked"));
                startTypewriter();
            }, 500);
        });

        muteToggle.addEventListener("click", () => {
            if (bgMusic.paused) {
                bgMusic.play();
                equalizer.classList.add('playing');
                muteToggle.textContent = "💖 MUSIC ON";
            } else {
                bgMusic.pause();
                equalizer.classList.remove('playing');
                muteToggle.textContent = "🔇 MUTED";
            }
            playCuteBeep(650, 0.05);
        });

        const textToType = "NEKO_STATUS: ACTIVE | CONNECTED: ESTABLISHED_OK | WELCOME TO MILISI HUB";
        let typeIndex = 0;
        function startTypewriter() {
            if (typeIndex < textToType.length) {
                document.getElementById("typewriter").textContent += textToType.charAt(typeIndex);
                if(Math.random() > 0.4) playCuteBeep(880, 0.01); 
                typeIndex++;
                setTimeout(startTypewriter, 45);
            }
        }

        // --- КАНВАС МАТРИЦЫ ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const symbols = '01🌸🎀🐾💗✨⭐🐈🐾'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];
        for(let x = 0; x < columns; x++) rainDrops[x] = Math.random() * -100;
        
        const draw = () => {
            ctx.fillStyle = 'rgba(15, 5, 11, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = symbols[Math.floor(Math.random() * symbols.length)];
                if (Math.random() > 0.95) ctx.fillStyle = '#fff';
                else if (Math.random() > 0.7) ctx.fillStyle = '#ff2a85';
                else ctx.fillStyle = '#ff85c0';
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.98) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 35);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
